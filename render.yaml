# Render Deployment Configuration
services:
  - type: web
    name: ddg-search-api
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: python main.py
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: PORT
        value: 8000
    plan: free
    region: oregon
    branch: main
    autoDeploy: true
    healthCheckPath: /
    disk:
      name: cache
      mountPath: /cache
      sizeGB: 1
